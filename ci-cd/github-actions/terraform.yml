name: Terraform CI/CD
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VERSION: '1.9.5'
    steps:
    - uses: actions/checkout@v4
    
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        
    - name: Terraform Init
      working-directory: ./infra
      run: terraform init -backend-config=../environments/${{ matrix.env }}/backend.tf
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
        
    - name: Terraform Plan
      working-directory: ./infra
      run: terraform plan -var-file=../environments/${{ matrix.env }}/terraform.tfvars
      
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      working-directory: ./infra
      run: terraform apply -auto-approve -var-file=../environments/${{ matrix.env }}/terraform.tfvars
