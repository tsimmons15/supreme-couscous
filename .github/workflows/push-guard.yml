name: GitFlow Push Guard
on:
  push:
    branches: ['dev/**', 'release/**', 'main']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate push to protected branches
        uses: actions/github-script@v8
        with:
          script: |
            const ref = context.ref;
            console.log(JSON.stringify(context, null, 2));
            const branch = ref.replace('refs/heads/', '');
            
            console.log(`Push detected to: ${branch}`);
            
            // Block ALL pushes to protected branches
            if (branch.startsWith('dev/') || 
                branch.startsWith('release/') || 
                branch === 'main') {
              core.setFailed(
                `🚫 Direct pushes to ${branch} are BLOCKED.\n` +
                `Use personal branches → PR to dev/* → PR to release/* → PR to main`
              );
            }
            
            console.log(`✅ Push to ${branch} allowed (personal branch)`);
