name: AEO Data Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: '1.9.5'

    - name: Terraform Plan DEV
      working-directory: ./infra
      env:
        TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_DEV }}
        TF_VAR_env: dev
      run: |
        terraform init -backend-config=../environments/dev/backend.tf
        terraform plan -var-file="../environments/dev/terraform.tfvars"

    - name: Terraform Plan STAGING
      working-directory: ./infra
      env:
        TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_STAGING }}
        TF_VAR_env: staging
      run: |
        terraform init -backend-config=../environments/staging/backend.tf
        terraform plan -var-file="../environments/staging/terraform.tfvars"

  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
    - uses: actions/checkout@v4

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: '1.9.5'

    - name: Terraform Apply DEV
      working-directory: ./infra
      env:
        TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_DEV }}
        TF_VAR_env: dev
      run: |
        terraform init -backend-config=../environments/dev/backend.tf
        terraform apply -auto-approve -var-file="../environments/dev/terraform.tfvars"

  build-templates:
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
    - uses: actions/checkout@v4
    - uses: google-github-actions/auth@v3
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    - uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Write GCP credentials
      run: |
        echo '${{ secrets.GCP_SA_KEY }}' > ${HOME}/gcp-sa.json
        echo "GOOGLE_APPLICATION_CREDENTIALS=${HOME}/gcp-sa.json" >> $GITHUB_ENV

    - name: Build & Upload Templates
      run: |
        set -e
        cd pipelines/pos-batch
        pip install -r requirements.txt
        python setup.py sdist

        cd ../web-streaming
        pip install -r requirements.txt
        python setup.py sdist
