name: Validate PR Source
on: [pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const source = context.payload.pull_request.head.ref;
            const target = context.payload.pull_request.base.ref;
            if (target === 'release' && !source.startsWith('dev/')) {
              echo 'Only dev/ branches can merge to release.'
              process.exit(1);
            }
            if (target === 'main' && !source.startsWith('release/')) {
              echo 'Only release/ branches can merge to main.'
              process.exit(1);
            }
            echo 'Unguarded merge.'
            process.exit(0)