name: gitflow  # ← Generates "gitflow / validate"

on:
  pull_request:
    branches: ['dev/*', 'release/*', 'main']
    types: [opened, synchronize, reopened]

jobs:
  validate:  # ← Job name creates "gitflow / validate"
    runs-on: ubuntu-latest
    steps:
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
      name: GitFlow Validation
      run: |
        SOURCE="${{ github.head_ref }}"
        TARGET="${{ github.base_ref }}"
        echo "::notice::PR: $SOURCE → $TARGET"
        if [[ "$TARGET" =~ ^dev/ ]]; then
          echo "::notice::✅ dev/* merge OK"
          exit 0
        elif [[ "$TARGET" =~ ^release/ && "$SOURCE" =~ ^dev/ ]]; then
          echo "::notice::✅ release/* from dev/* OK"
          exit 0
        elif [[ "$TARGET" == "main" && "$SOURCE" =~ ^release/ ]]; then
          echo "::notice::✅ main from release/* OK"
          exit 0
        else
          echo "::error::❌ INVALID: $SOURCE → $TARGET"
          exit 1
        fi