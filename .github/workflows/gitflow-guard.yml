name: Validate PR Source
on: [pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    # Critical: Set exact check name matching your ruleset expectation
    outputs:
      result: ${{ steps.validate.outputs.result }}
    
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const source = context.payload.pull_request.head.ref;
            const target = context.payload.pull_request.base.ref;
            if (target === 'release' && !source.startsWith('dev/')) {
              github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'REQUEST_CHANGES',
                body: 'Only dev/ branches can merge to release.'
              });
              process.exit(1);
            }
            if (target === 'main' && !source.startsWith('release/')) {
              github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'REQUEST_CHANGES',
                body: 'Only release/ branches can merge to main.'
              });
              process.exit(1);
            }
